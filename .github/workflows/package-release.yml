name: Package MeeTree

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  package:
    name: Build app archive
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build release archive
        id: package
        env:
          MEETREE_SIGNING_KEY: ${{ secrets.MEETREE_SIGNING_KEY }}
        run: |
          set -eu
          sh meetree/scripts/package-release.sh
          version="$(grep -m1 '<version>' meetree/appinfo/info.xml | sed -E 's/.*<version>([^<]+)<\/version>.*/\1/')"
          archive="build/meetree-${version}.tar.gz"
          signature="${archive}.sig"
          if [ -n "${MEETREE_SIGNING_KEY}" ]; then
            printf '%s' "${MEETREE_SIGNING_KEY}" > meetree-signing.key
            chmod 600 meetree-signing.key
            docker run --rm \
              -v "${PWD}/build/meetree:/var/www/html/custom_apps/meetree" \
              -v "${PWD}/meetree-signing.key:/tmp/meetree-signing.key" \
              nextcloud:33 \
              sh -c 'chown -R www-data:www-data /var/www/html/custom_apps/meetree /tmp/meetree-signing.key && su -s /bin/sh www-data -c "php occ integrity:sign-app --privateKey=/tmp/meetree-signing.key --certificate=/var/www/html/custom_apps/meetree/appinfo/certificate.crt --path=/var/www/html/custom_apps/meetree"'
            rm -f meetree-signing.key "${archive}"
            tar -czf "${archive}" -C build meetree
            printf '%s' "${MEETREE_SIGNING_KEY}" > meetree-signing.key
            openssl dgst -sha512 -sign meetree-signing.key "${archive}" | openssl base64 -A > "${signature}"
            rm -f meetree-signing.key
          fi
          test -f "${archive}"
          echo "version=${version}" >> "${GITHUB_OUTPUT}"
          echo "archive=${archive}" >> "${GITHUB_OUTPUT}"
          echo "signature=${signature}" >> "${GITHUB_OUTPUT}"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: meetree-${{ steps.package.outputs.version }}
          path: |
            ${{ steps.package.outputs.archive }}
            ${{ steps.package.outputs.signature }}
          if-no-files-found: error

      - name: Publish tagged GitHub release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
          ARCHIVE: ${{ steps.package.outputs.archive }}
          SIGNATURE: ${{ steps.package.outputs.signature }}
          VERSION: ${{ steps.package.outputs.version }}
        run: |
          set -eu
          assets="${ARCHIVE}"
          if [ -f "${SIGNATURE}" ]; then
            assets="${assets} ${SIGNATURE}"
          fi
          if gh release view "${TAG_NAME}" >/dev/null 2>&1; then
            gh release upload "${TAG_NAME}" ${assets} --clobber
          else
            gh release create "${TAG_NAME}" ${assets} --title "MeeTree ${VERSION}" --notes "MeeTree ${VERSION} release package for Nextcloud."
          fi
