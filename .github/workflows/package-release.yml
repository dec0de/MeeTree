name: Package MeeTree

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  package:
    name: Build app archive
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build release archive
        id: package
        run: |
          set -eu
          sh meetree/scripts/package-release.sh
          version="$(grep -m1 '<version>' meetree/appinfo/info.xml | sed -E 's/.*<version>([^<]+)<\/version>.*/\1/')"
          archive="build/meetree-${version}.tar.gz"
          test -f "${archive}"
          echo "version=${version}" >> "${GITHUB_OUTPUT}"
          echo "archive=${archive}" >> "${GITHUB_OUTPUT}"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: meetree-${{ steps.package.outputs.version }}
          path: ${{ steps.package.outputs.archive }}
          if-no-files-found: error

      - name: Publish tagged GitHub release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
          ARCHIVE: ${{ steps.package.outputs.archive }}
          VERSION: ${{ steps.package.outputs.version }}
        run: |
          set -eu
          if gh release view "${TAG_NAME}" >/dev/null 2>&1; then
            gh release upload "${TAG_NAME}" "${ARCHIVE}" --clobber
          else
            gh release create "${TAG_NAME}" "${ARCHIVE}" --title "MeeTree ${VERSION}" --notes "MeeTree ${VERSION} release package for Nextcloud."
          fi
